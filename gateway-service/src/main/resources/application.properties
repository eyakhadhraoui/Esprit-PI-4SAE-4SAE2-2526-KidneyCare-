# -----------------------------
# Gateway configuration
# -----------------------------
spring.application.name=ai-gateway
server.port=8095

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Attention : le port 8095 est aussi utilisé par d'autres modules locaux (ex. graft-service).
# En dev, ne lancez qu'un seul service sur 8095 ou changez server.port ci-dessous.

# -----------------------------
# Security (Keycloak JWT)
# Voir SecurityConfig + KeycloakRealmRolesConverter + GatewayJwtConfig
# -----------------------------
# Doit correspondre au claim iss des JWT émis par Keycloak. Symfony user-service utilise en général
# KEYCLOAK_BASE_URL=http://127.0.0.1:8080 → iss = http://127.0.0.1:8080/realms/... (pas localhost).
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://127.0.0.1:8080/realms/kidneyCare-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://127.0.0.1:8080/realms/kidneyCare-realm/protocol/openid-connect/certs

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

# Microservice utilisateur Symfony (M0 — PostgreSQL), hors Eureka : auth + /api/users
# Aligné sur Symfony CLI (127.0.0.1:8000 par défaut). Docker : http://user-service:8000
gateway.user-service.uri=http://127.0.0.1:8000

