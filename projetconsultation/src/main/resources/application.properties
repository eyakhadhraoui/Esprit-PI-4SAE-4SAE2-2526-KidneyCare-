spring.application.name=projetconsultation
spring.datasource.url=jdbc:mysql://localhost:3306/nep?createDatabaseIfNotExist=true&zeroDateTimeBehavior=CONVERT_TO_NULL&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
server.port=8081
server.servlet.context-path=/projet
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC

# Desactiver config server
spring.config.import=optional:configserver:
spring.cloud.config.enabled=false

# Eureka
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/kidneyCare-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/kidneyCare-realm/protocol/openid-connect/certs
keycloak.auth-server-url=http://localhost:8080
keycloak.realm=kidneyCare-realm
keycloak.resource=kidneycare-app
keycloak.credentials.secret=
keycloak.admin.username=admin
keycloak.admin.password=admin

# Monitoring (Actuator + Prometheus)
management.endpoints.web.exposure.include=health,info,prometheus
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}