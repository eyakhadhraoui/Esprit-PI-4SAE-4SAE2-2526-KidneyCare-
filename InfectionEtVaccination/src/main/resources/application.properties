spring.application.name=InfectionEtVaccination
server.port=8082
spring.cloud.config.enabled=false

# MySQL local (XAMPP / MySQL installé) — surchargé par env ou par le profil "docker"
# Exemple MySQL lancé via docker-compose sur l’hôte : jdbc:mysql://localhost:13307/nep?...
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/nep?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true

# Monitoring (Actuator + Prometheus)
management.endpoints.web.exposure.include=health,info,prometheus
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}