spring.application.name=projetparametrevital
# PORT DIFFERENT (sinon conflit avec 8081)
server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/nep?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Format date (cohérent avec consultation)
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC

# Config server (optionnel)
spring.config.import=optional:configserver:

# Désactiver Eureka si non utilisé
eureka.client.enabled=false
# Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/kidneyCare-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/kidneyCare-realm/protocol/openid-connect/certs

