spring.application.name=Nutrition_Service
spring.datasource.url=jdbc:mysql://localhost:3306/nep?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
server.port=8088

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true

# OpenFeign → NEPHRO (DossierMedical + ResultatLaboratoire)
nephro.service.url=http://localhost:8089

# Keycloak / JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/kidneyCare-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/kidneyCare-realm/protocol/openid-connect/certs

# Monitoring (Actuator + Prometheus)
management.endpoints.web.exposure.include=health,info,prometheus
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
