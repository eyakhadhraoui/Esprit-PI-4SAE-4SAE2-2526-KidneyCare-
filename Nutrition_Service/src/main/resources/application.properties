spring.application.name=nutrition-Service
spring.datasource.url=jdbc:mysql://mysql:3306/nutrition?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
server.port=8084

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true

# Keycloak / JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/kidneyCare-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/kidneyCare-realm/protocol/openid-connect/certs