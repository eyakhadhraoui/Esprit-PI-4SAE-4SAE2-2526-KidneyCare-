server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Résolution DNS Docker (évite "host not found in upstream" au démarrage)
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Routing SPA Angular — redirige toutes les routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # =====================
    # Reverse proxy API (Docker Compose)
    # =====================

    # SockJS/STOMP (WebSocket) -> service NEPHRO
    location /ws/ {
        set $nephro_ws http://nephro:8089;
        proxy_pass $nephro_ws/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    # API principale NEPHRO
    location /api/ {
        set $nephro_api http://nephro:8089;
        # Important: avec `proxy_pass` + variable, éviter d'ajouter un URI ici,
        # sinon Nginx peut transmettre un chemin inattendu au backend.
        proxy_pass $nephro_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # Pendant le démarrage (NEPHRO long), on réessaie avant de renvoyer un 502 au front.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 30;
        proxy_next_upstream_timeout 60s;
    }
    location /suivis/ {
        set $nephro_suivis http://nephro:8089;
        proxy_pass $nephro_suivis;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /uploads/ {
        set $nephro_uploads http://nephro:8089;
        proxy_pass $nephro_uploads;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Consultation
    location /projet/ {
        rewrite ^/projet/?(.*)$ /$1 break;
        set $consultation http://consultation:8081;
        proxy_pass $consultation;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Prescription (strip /prescription comme en dev: pathRewrite)
    location /prescription/ {
        rewrite ^/prescription/?(.*)$ /$1 break;
        set $prescription http://prescription:8086;
        proxy_pass $prescription;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Paramètres vitaux (strip /vital comme en dev: pathRewrite)
    location /vital/ {
        rewrite ^/vital/?(.*)$ /$1 break;
        set $parametrevital http://parametrevital:8082;
        proxy_pass $parametrevital;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Greffe (strip /graft-api comme en dev: pathRewrite)
    location /graft-api/ {
        rewrite ^/graft-api/?(.*)$ /$1 break;
        set $greffe http://greffe:8096;
        proxy_pass $greffe;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Cache des assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
