spring.application.name=FoncGreffon
server.port=8096
spring.cloud.config.enabled=false

# MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/nep?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Move Spring Data REST to a separate base path so it doesn't conflict with @RestController endpoints at /api/*
spring.data.rest.base-path=/data-rest

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Feign
spring.cloud.openfeign.httpclient.hc5.enabled=false

# JWT — Keycloak (même realm que les autres microservices)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/kidneyCare-realm

# Monitoring (Actuator + Prometheus)
management.endpoints.web.exposure.include=health,info,prometheus
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}