version: '3.8'

networks:
  kidneycare-net:
    driver: bridge

volumes:
  mysql-data:
  keycloak-data:

services:

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: prescription-Service
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - kidneycare-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks:
      - kidneycare-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/realms/master || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15

  # Eureka Server
  eureka-server:
    build:
      context: ./EurekaServer
    container_name: eureka-server
    restart: unless-stopped
    environment:
      SPRING_APPLICATION_NAME: EurekaServer
      SERVER_PORT: 8761
    ports:
      - "8761:8761"
    networks:
      - kidneycare-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Gateway (API)
  gateway:
    build:
      context: ./API
    container_name: gateway
    restart: unless-stopped
    environment:
      SPRING_APPLICATION_NAME: gateway
      SERVER_PORT: 8095
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8095:8095"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - kidneycare-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8095/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Prescription Service
  prescription-service:
    build:
      context: ./prescription-Service
    container_name: prescription-service
    restart: unless-stopped
    environment:
      SPRING_APPLICATION_NAME: prescription-Service
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/prescription-Service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/kidneyCare-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/kidneyCare-realm/protocol/openid-connect/certs
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - kidneycare-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8086/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Nutrition Service
  nutrition-service:
    build:
      context: ./Nutrition_Service/Nutrition_Service
    container_name: nutrition-service
    restart: unless-stopped
    environment:
      SPRING_APPLICATION_NAME: Nutrition_Service
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/nutrition_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/kidneyCare-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/kidneyCare-realm/protocol/openid-connect/certs
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - kidneycare-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # NEPHRO Service (Monitoring Renal)
  nephro-service:
    build:
      context: ./NEPHRO
    container_name: nephro-service
    restart: unless-stopped
    environment:
      SPRING_APPLICATION_NAME: NEPHRO
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/NEPHRO?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/kidneyCare-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/kidneyCare-realm/protocol/openid-connect/certs
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - kidneycare-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Infection & Vaccination Service
  infection-service:
    build:
      context: ./InfectionEtVaccination
    container_name: infection-service
    restart: unless-stopped
    environment:
      SPRING_APPLICATION_NAME: InfectionEtVaccination
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/infection_vaccination?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/kidneyCare-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/kidneyCare-realm/protocol/openid-connect/certs
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - kidneycare-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Consultation Service
  consultation-service:
    build:
      context: ./projetconsultation
    container_name: consultation-service
    restart: unless-stopped
    environment:
      SPRING_APPLICATION_NAME: consultation-Service
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/consultation?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=CONVERT_TO_NULL
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/kidneyCare-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/kidneyCare-realm/protocol/openid-connect/certs
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - kidneycare-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8081/projet/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Graft Function Service (FoncGreffon)
  graft-service:
    build:
      context: ./FoncGreffon
    container_name: graft-service
    restart: unless-stopped
    environment:
      SPRING_APPLICATION_NAME: FoncGreffon
      SERVER_PORT: 8089
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/FoncGreffon?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/kidneyCare-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/kidneyCare-realm/protocol/openid-connect/certs
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
    ports:
      - "8089:8089"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - kidneycare-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8089/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Vital Parameters Service (projetparametrevital)
  vital-params-service:
    build:
      context: ./projetparametrevital/projetparametrevital
    container_name: vital-params-service
    restart: unless-stopped
    environment:
      SPRING_APPLICATION_NAME: projetparametrevital
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vital_params?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/kidneyCare-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/kidneyCare-realm/protocol/openid-connect/certs
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
    ports:
      - "8087:8087"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - kidneycare-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8087/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Angular Frontend
  frontend:
    build:
      context: ./mon-projet
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      GATEWAY_HOST: gateway:8095
      KEYCLOAK_HOST: keycloak:8080
    depends_on:
      - gateway
      - prescription-service
      - nutrition-service
      - nephro-service
      - infection-service
      - consultation-service
      - graft-service
      - vital-params-service
    networks:
      - kidneycare-net
