apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  labels:
    app.kubernetes.io/name: eureka
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: eureka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eureka
    spec:
      containers:
        - name: eureka
          image: kidneycare/eureka:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
          # Évite que la liveness tue le pod pendant le démarrage lent du JVM (Minikube).
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 42
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
