apiVersion: apps/v1
kind: Deployment
metadata:
  name: infection-vaccination
  labels:
    app.kubernetes.io/name: infection-vaccination
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infection-vaccination
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infection-vaccination
    spec:
      containers:
        - name: infection-vaccination
          image: kidneycare/infection-vaccination:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/nep?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kidneycare-secrets
                  key: mysql-user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kidneycare-secrets
                  key: mysql-password
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              value: http://eureka:8761/eureka
            - name: EUREKA_INSTANCE_HOSTNAME
              value: infection-vaccination
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 20
