apiVersion: apps/v1
kind: Deployment
metadata:
  name: nephro
  labels:
    app.kubernetes.io/name: nephro
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nephro
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nephro
    spec:
      containers:
        - name: nephro
          image: kidneycare/nephro:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8089
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/nep?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kidneycare-secrets
                  key: mysql-user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kidneycare-secrets
                  key: mysql-password
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              value: http://eureka:8761/eureka
            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "true"
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: nephro
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: http://keycloak:8080/realms/kidneyCare-realm/protocol/openid-connect/certs
            - name: KEYCLOAK_URL
              value: http://keycloak:8080
            - name: SPRING_MAIL_HOST
              value: mailhog
            - name: SPRING_MAIL_PORT
              value: "1025"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: lab-agent
              mountPath: /app/agent_analyse_labo.py
              subPath: agent_analyse_labo.py
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/auth/ping
              port: 8089
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/auth/ping
              port: 8089
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: nephro-uploads
        - name: lab-agent
          configMap:
            name: nephro-lab-agent
            optional: true
