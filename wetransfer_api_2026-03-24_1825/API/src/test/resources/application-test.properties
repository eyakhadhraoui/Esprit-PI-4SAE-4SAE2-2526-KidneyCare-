# Pas de base MySQL sur la gateway — désactivation discovery pour les tests

eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.cloud.discovery.enabled=false

spring.cloud.config.enabled=false

gateway.keycloak.jwk-set-uri=http://127.0.0.1:9/realms/off/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://127.0.0.1:9/realms/off/protocol/openid-connect/certs
