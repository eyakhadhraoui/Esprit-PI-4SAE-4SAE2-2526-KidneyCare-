# Dev local sans Docker/Eureka : démarrer NEPHRO (8089), prescription (8086), etc. puis la gateway avec :
#   --spring.profiles.active=local
spring.config.activate.on-profile=local

eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

gateway.routing.uri.dossiermedicale=http://127.0.0.1:8089
gateway.routing.uri.prescription-service=http://127.0.0.1:8086
gateway.routing.uri.infection=http://127.0.0.1:8082
gateway.routing.uri.projetconsultation=http://127.0.0.1:8081
gateway.userservice.uri=http://127.0.0.1:8000
