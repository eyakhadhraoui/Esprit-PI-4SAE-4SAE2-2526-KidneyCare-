# -----------------------------
# Gateway configuration
# -----------------------------
spring.application.name=ai-gateway
server.port=8095

# Requêtes multipart (ex. /suivis/upload) : éviter la limite mémoire par défaut (~256 Ko) sur certains chemins
spring.codec.max-in-memory-size=50MB

# -----------------------------
# ✅ JWT Standard Spring Boot (requis pour ReactiveJwtDecoder)
# -----------------------------
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${GATEWAY_KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/kidneyCare-realm/protocol/openid-connect/certs}

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# -----------------------------
# Security custom (issuers multiples)
# -----------------------------
gateway.keycloak.jwk-set-uri=${GATEWAY_KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/kidneyCare-realm/protocol/openid-connect/certs}
gateway.keycloak.allowed-issuers=${GATEWAY_KEYCLOAK_ALLOWED_ISSUERS:http://localhost:8081/realms/kidneyCare-realm,http://127.0.0.1:8081/realms/kidneyCare-realm,http://keycloak:8080/realms/kidneyCare-realm}

# Microservice utilisateur Symfony
gateway.userservice.uri=${GATEWAY_USERSERVICE_URI:http://user-service:8000}

# Public host used to build OpenAPI server URLs (overridden by X-Forwarded headers from upstream proxy)
gateway.public.host=${GATEWAY_PUBLIC_HOST:localhost:8095}

# Cibles des routes microservices (défaut Eureka). Sans Eureka : profil local ou variables GATEWAY_*_URI (http://127.0.0.1:port).
gateway.routing.uri.dossiermedicale=${GATEWAY_DOSSIERMEDICALE_URI:lb://dossiermedicale}
gateway.routing.uri.prescription-service=${GATEWAY_PRESCRIPTION_SERVICE_URI:lb://prescription-Service}
gateway.routing.uri.infection=${GATEWAY_INFECTION_URI:lb://InfectionEtVaccination}
gateway.routing.uri.projetconsultation=${GATEWAY_PROJETCONSULTATION_URI:lb://projetconsultation}

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

# -----------------------------
# Swagger UI centralisé — URLs = chemins déjà routés (GatewayRoutesConfig)
# UI : http://localhost:8095/swagger-ui.html
# -----------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.urls[0].name=\uD83D\uDC8A Prescription Service
springdoc.swagger-ui.urls[0].url=/prescriptions-openapi/v3/api-docs
springdoc.swagger-ui.urls[1].name=\uD83C\uDFE5 Dossier medical
springdoc.swagger-ui.urls[1].url=/dossiers-openapi/v3/api-docs
springdoc.swagger-ui.urls[2].name=\uD83E\uDE7A Consultations
springdoc.swagger-ui.urls[2].url=/projet-openapi/v3/api-docs
springdoc.swagger-ui.urls[3].name=\uD83E\uDDA0 Infection et vaccination
springdoc.swagger-ui.urls[3].url=/infection-openapi/v3/api-docs
springdoc.swagger-ui.urlsPrimaryName=\uD83D\uDC8A Prescription Service

# OAuth2 PKCE — pre-fill client ID so users only need to click Authorize + log in
springdoc.swagger-ui.oauth.clientId=kidneycare-app
springdoc.swagger-ui.oauth.realm=kidneyCare-realm
springdoc.swagger-ui.oauth.appName=KidneyCare
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true
springdoc.swagger-ui.oauth.scopes=openid profile

# Actuator / Prometheus (monitoring)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}