spring.application.name=DossierMedical
server.port=8089

# Eureka : enregistrement auprès du serveur (demo)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ========== MySQL — vérifier que le serveur MySQL est démarré sur localhost:3306 ==========
spring.datasource.url=jdbc:mysql://localhost:3306/nep?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
# vide si pas de mot de passe
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP : taille du pool (évite "Maximum pool size: undefined/unknown")
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Inclure le message d'exception dans les r?ponses 500 (pour le diagnostic)
server.error.include-message=always

# Keycloak ? validation des JWT ?mis par le front (Angular + Keycloak)
# M?me realm et URL que keycloak-config.ts c?t? Angular
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/kidneyCare-realm
# Optionnel : audience (client id) si Keycloak l?envoie dans le token
# spring.security.oauth2.resourceserver.jwt.audiences=vurr-frontend

# Keycloak ? login personnalis? (Resource Owner Password) : client pour obtenir un token
# Dans Keycloak Admin : Clients ? kidneycare-app ? onglet "Settings" ? activer "Direct access grants"
keycloak.url=http://localhost:8080
keycloak.realm=kidneyCare-realm
keycloak.client-id-backend=kidneycare-app
keycloak.client-secret=

# Keycloak Admin ? OBLIGATOIRE pour que l'inscription enregistre le patient dans Keycloak ET MySQL
# Compte admin du realm master (ex: admin / admin en dev). ? renseigner pour activer la cr?ation Keycloak.
keycloak.admin.username=admin
keycloak.admin.password=admin

# Seuil (en jours) pour alerte "aucun suivi depuis N jours". Configurable par m?decin c?t? front (param?tre ?jours=).
alerte.suivi.jours=90
# Job rappel : cron (d?faut tous les jours ? 8h). Pour d?sactiver : alerte.cron=-
# alerte.cron=0 0 8 * * ?
# Email rappel : activer et d?finir le destinataire pour recevoir un r?sum? des alertes par email
# alerte.email.actif=true
# alerte.email.destinataire=medecin@example.com
# ========== MAIL (suivi ajout? au patient + rappels alertes) ==========
# Quand un m?decin ajoute un suivi, un email est envoy? au patient (email en base). D?sactiver : notification.suivi.patient.actif=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=alpha2025group@gmail.com
spring.mail.password=denw sakk zclp wdbv
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Exp?diteur des emails (suivi ajout?, rappels)
app.mail.from=alpha2025group@gmail.com
app.mail.from-name=KidneyCare - Syst?me M?dical
# Activer/d?sactiver l'email au patient quand un suivi est ajout? (d?faut: true)
notification.suivi.patient.actif=true
# OCR (scan suivi) : d?sactiver si Tesseract n'est pas install? (?vite l'erreur "Invalid memory access").
# Avec app.ocr.enabled=false, le bouton OCR affiche un message au lieu d'appeler Tesseract.
app.ocr.enabled=false
# Quand OCR activ? : installer Tesseract (https://github.com/UB-Mannheim/tesseract/wiki), puis d?commenter :
# app.ocr.enabled=true
# app.ocr.datapath=C:/Program Files/Tesseract-OCR
# app.ocr.lang=eng

# Agent Python d'analyse labo (POST /api/lab-analysis) — le script est aussi embarqué (classpath:lab/agent_analyse_labo.py).
# Si besoin d'un fichier externe : chemin absolu ou relatif au répertoire de travail du processus Java.
lab.analysis.python-exec=python
lab.analysis.script-path=../agent_analyse_labo.py
lab.analysis.timeout-seconds=45

# Rappel patient : prescription EN_ATTENTE depuis ≥ lab.rappel.jours-delai (ex. 7 j) — WebSocket /topic/patient/{id}
lab.rappel.jours-delai=7
lab.rappel.cron=0 0 7 * * ?